name: build-package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore Transaq.NinjaTraderAdapter.sln

      - name: Build and package
        shell: pwsh
        run: ./build-package.ps1 -Configuration Release -Platform "Any CPU"

      - name: Upload NT8 Add-On zip
        uses: actions/upload-artifact@v4
        with:
          name: Transaq.NinjaTraderAdapter.NT8.AddOn
          path: dist/Transaq.NinjaTraderAdapter.NT8.AddOn.zip

      - name: Upload portable release zip
        uses: actions/upload-artifact@v4
        with:
          name: Transaq.NinjaTraderAdapter.Release
          path: dist/Transaq.NinjaTraderAdapter.Release.zip
